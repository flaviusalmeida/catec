# Perfil local — variáveis em catec-backend/.env (veja catec-backend/.env.example).
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/catec}
    username: ${SPRING_DATASOURCE_USERNAME:catec}
    password: ${SPRING_DATASOURCE_PASSWORD:catec}
    driver-class-name: org.postgresql.Driver
  flyway:
    # Dev: scripts V* já aplicados no banco foram alterados no repositório (checksum diferente).
    # `false` evita abortar a subida; o caminho correto é `./mvnw flyway:repair` para alinhar flyway_schema_history.
    # Não use em produção — lá não se edita migração já aplicada; crie sempre um V novo.
    validate-on-migrate: false

app:
  mail:
    enabled: ${APP_MAIL_ENABLED:true}

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver: warn

# OpenAPI / Swagger UI (task_014) — só em desenvolvimento
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
