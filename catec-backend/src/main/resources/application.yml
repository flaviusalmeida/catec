spring:
  application:
    name: catec-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from: ${APP_MAIL_FROM:noreply@catec.local}
  security:
    jwt:
      secret: ${JWT_SECRET:catec-dev-jwt-secret-min-32b-please-change!!}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
